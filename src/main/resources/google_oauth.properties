# ─── Google OAuth 2.0 credentials for "Continue with Google" ───
# Get these from https://console.cloud.google.com → APIs & Services → Credentials
# → Create Credentials → OAuth client ID → application type "Desktop app"
#
# This file is the project default / template. Real credentials are stored
# (and overridden) at  ~/.evento/google_oauth.properties  — written via the
# in-app first-run setup dialog. You can also override by passing the JVM
# flags  -Dgoogle.client.id=...  -Dgoogle.client.secret=...
#
# See GOOGLE_OAUTH_SETUP.md (project root) for full instructions.

google.client.id=YOUR_CLIENT_ID_HERE.apps.googleusercontent.com
google.client.secret=YOUR_CLIENT_SECRET_HERE
